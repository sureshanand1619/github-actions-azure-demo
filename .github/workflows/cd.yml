name: CD - Deploy to VMSS

on:
  workflow_run:
    workflows:
      - "CI - Build and Push"
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      image_tag:
        description: 'Docker image tag to deploy'
        required: false
        default: 'latest'

env:
  TF_VERSION: '1.9.8'

jobs:

  # ============================================================
  # JOB 1: Get Terraform Outputs
  # ============================================================
  get-infra-outputs:
    name: Get Terraform Outputs
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    env:
      ENVIRONMENT: ${{ inputs.environment || 'dev' }}
      WORKING_DIR: terraform/env/${{ inputs.environment || 'dev' }}

    outputs:
      acr_login_server: ${{ steps.tf-outputs.outputs.acr_login_server }}
      resource_group_name: ${{ steps.tf-outputs.outputs.resource_group_name }}
      lb_public_ip: ${{ steps.tf-outputs.outputs.lb_public_ip }}
      vmss_name: ${{ steps.tf-outputs.outputs.vmss_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.WORKING_DIR }}
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Read Terraform Outputs
        id: tf-outputs
        run: |
          ACR_LOGIN_SERVER=$(terraform output -raw acr_login_server)
          RESOURCE_GROUP=$(terraform output -raw resource_group_name)
          LB_PUBLIC_IP=$(terraform output -raw load_balancer_public_ip)

          echo "acr_login_server=$ACR_LOGIN_SERVER" >> $GITHUB_OUTPUT
          echo "resource_group_name=$RESOURCE_GROUP" >> $GITHUB_OUTPUT
          echo "lb_public_ip=$LB_PUBLIC_IP" >> $GITHUB_OUTPUT
          echo "vmss_name=${{ env.ENVIRONMENT }}-vmss" >> $GITHUB_OUTPUT

          echo "ACR Login Server: $ACR_LOGIN_SERVER"
          echo "Resource Group: $RESOURCE_GROUP"
          echo "LB Public IP: $LB_PUBLIC_IP"
        working-directory: ${{ env.WORKING_DIR }}
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

  # ============================================================
  # JOB 2: Update VMSS with New Image
  # ============================================================
  deploy:
    name: Deploy to VMSS
    runs-on: ubuntu-latest
    needs: get-infra-outputs
    environment: ${{ inputs.environment || 'dev' }}

    env:
      ENVIRONMENT: ${{ inputs.environment || 'dev' }}
      IMAGE_TAG: ${{ inputs.image_tag || 'latest' }}

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get image tag from CI run
        id: image
        run: |
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            # Triggered by CI - use the commit SHA that triggered CI
            IMAGE_TAG="${{ github.event.workflow_run.head_sha }}"
          else
            IMAGE_TAG="${{ env.IMAGE_TAG }}"
          fi
          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Image tag to deploy: $IMAGE_TAG"

      - name: Update VMSS custom data with new image tag
        run: |
          az vmss update \
            --resource-group ${{ needs.get-infra-outputs.outputs.resource_group_name }} \
            --name ${{ needs.get-infra-outputs.outputs.vmss_name }} \
            --set virtualMachineProfile.extensionProfile=null

      - name: Update VMSS instances to pull new image
        run: |
          az vmss update-instances \
            --resource-group ${{ needs.get-infra-outputs.outputs.resource_group_name }} \
            --name ${{ needs.get-infra-outputs.outputs.vmss_name }} \
            --instance-ids "*"

      - name: Run deploy script on VMSS instances
        run: |
          az vmss run-command invoke \
            --resource-group ${{ needs.get-infra-outputs.outputs.resource_group_name }} \
            --name ${{ needs.get-infra-outputs.outputs.vmss_name }} \
            --command-id RunShellScript \
            --instance-id 0 \
            --scripts "
              docker login ${{ needs.get-infra-outputs.outputs.acr_login_server }} \
                -u ${{ secrets.ACR_USERNAME }} \
                -p ${{ secrets.ACR_PASSWORD }} && \
              docker pull ${{ needs.get-infra-outputs.outputs.acr_login_server }}/app:${{ steps.image.outputs.tag }} && \
              docker stop app || true && \
              docker rm app || true && \
              docker run -d \
                --name app \
                --restart always \
                -p 80:3000 \
                -e ENVIRONMENT=${{ env.ENVIRONMENT }} \
                -e APP_VERSION=${{ steps.image.outputs.tag }} \
                ${{ needs.get-infra-outputs.outputs.acr_login_server }}/app:${{ steps.image.outputs.tag }}
            "

  # ============================================================
  # JOB 3: Smoke Test
  # ============================================================
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs:
      - get-infra-outputs
      - deploy

    steps:
      - name: Wait for app to start
        run: sleep 30

      - name: Test health endpoint
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ needs.get-infra-outputs.outputs.lb_public_ip }}/health)

          echo "Health check status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Health check failed with status $HTTP_STATUS"
            exit 1
          fi

          echo "Health check passed"

      - name: Test root endpoint
        run: |
          RESPONSE=$(curl -s http://${{ needs.get-infra-outputs.outputs.lb_public_ip }}/)
          echo "Response: $RESPONSE"

          echo $RESPONSE | grep -q "GitHub Actions" && \
            echo "Root endpoint check passed" || \
            (echo "Root endpoint check failed" && exit 1)
