name: CI-CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      image_tag:
        description: 'Docker image tag to deploy'
        required: false
        default: 'latest'

env:
  IMAGE_NAME: app
  TF_VERSION: '1.9.8'
  ENVIRONMENT: ${{ inputs.environment || 'dev' }}

jobs:

  # ============================================================
  # JOB 1: Unit Tests
  # ============================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run tests
        working-directory: app
        run: npm test

  # ============================================================
  # JOB 2: Build, Scan and Push to ACR
  # ============================================================
  build-and-push:
    name: Build and Push to ACR
    runs-on: ubuntu-latest
    needs: test

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: meta
        run: echo "version=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image
        working-directory: app
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL
        env:
          TRIVY_USERNAME: ${{ secrets.ACR_USERNAME }}
          TRIVY_PASSWORD: ${{ secrets.ACR_PASSWORD }}

      - name: Push Docker image to ACR
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

  # ============================================================
  # JOB 3: Manual Approval
  # ============================================================
  approval:
    name: Manual Approval
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ inputs.environment || 'dev' }}

    steps:
      - name: Approval Gate
        run: |
          echo "Image ${{ needs.build-and-push.outputs.image_tag }} approved for deployment to ${{ env.ENVIRONMENT }}"

  # ============================================================
  # JOB 4: Get Terraform Outputs
  # ============================================================
  get-infra-outputs:
    name: Get Terraform Outputs
    runs-on: ubuntu-latest
    needs: approval

    outputs:
      acr_login_server: ${{ steps.tf-outputs.outputs.acr_login_server }}
      resource_group_name: ${{ steps.tf-outputs.outputs.resource_group_name }}
      lb_public_ip: ${{ steps.tf-outputs.outputs.lb_public_ip }}
      vmss_name: ${{ steps.tf-outputs.outputs.vmss_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/env/${{ env.ENVIRONMENT }}
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Read Terraform Outputs
        id: tf-outputs
        run: |
          ACR_LOGIN_SERVER=$(terraform output -raw acr_login_server)
          RESOURCE_GROUP=$(terraform output -raw resource_group_name)
          LB_PUBLIC_IP=$(terraform output -raw load_balancer_public_ip)

          echo "acr_login_server=$ACR_LOGIN_SERVER" >> $GITHUB_OUTPUT
          echo "resource_group_name=$RESOURCE_GROUP" >> $GITHUB_OUTPUT
          echo "lb_public_ip=$LB_PUBLIC_IP" >> $GITHUB_OUTPUT
          echo "vmss_name=${{ env.ENVIRONMENT }}-vmss" >> $GITHUB_OUTPUT

          echo "ACR Login Server : $ACR_LOGIN_SERVER"
          echo "Resource Group   : $RESOURCE_GROUP"
          echo "LB Public IP     : $LB_PUBLIC_IP"
        working-directory: terraform/env/${{ env.ENVIRONMENT }}
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

  # ============================================================
  # JOB 5: Deploy to VMSS
  # ============================================================
  deploy:
    name: Deploy to VMSS
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - get-infra-outputs

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy new image to VMSS instances
        run: |
          az vmss run-command invoke \
            --resource-group ${{ needs.get-infra-outputs.outputs.resource_group_name }} \
            --name ${{ needs.get-infra-outputs.outputs.vmss_name }} \
            --command-id RunShellScript \
            --instance-id 0 \
            --scripts "
              docker login ${{ needs.get-infra-outputs.outputs.acr_login_server }} \
                -u ${{ secrets.ACR_USERNAME }} \
                -p ${{ secrets.ACR_PASSWORD }} && \
              docker pull ${{ needs.get-infra-outputs.outputs.acr_login_server }}/app:${{ needs.build-and-push.outputs.image_tag }} && \
              docker stop app || true && \
              docker rm app || true && \
              docker run -d \
                --name app \
                --restart always \
                -p 80:3000 \
                -e ENVIRONMENT=${{ env.ENVIRONMENT }} \
                -e APP_VERSION=${{ needs.build-and-push.outputs.image_tag }} \
                ${{ needs.get-infra-outputs.outputs.acr_login_server }}/app:${{ needs.build-and-push.outputs.image_tag }}
            "

      - name: Update VMSS instances
        run: |
          az vmss update-instances \
            --resource-group ${{ needs.get-infra-outputs.outputs.resource_group_name }} \
            --name ${{ needs.get-infra-outputs.outputs.vmss_name }} \
            --instance-ids "*"

  # ============================================================
  # JOB 6: Smoke Test
  # ============================================================
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs:
      - get-infra-outputs
      - deploy

    steps:
      - name: Wait for app to start
        run: sleep 30

      - name: Test health endpoint
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ needs.get-infra-outputs.outputs.lb_public_ip }}/health)

          echo "Health check status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Health check failed with status $HTTP_STATUS"
            exit 1
          fi

          echo "Health check passed"

      - name: Test root endpoint
        run: |
          RESPONSE=$(curl -s http://${{ needs.get-infra-outputs.outputs.lb_public_ip }}/)
          echo "Response: $RESPONSE"

          echo $RESPONSE | grep -q "GitHub Actions" && \
            echo "Root endpoint check passed" || \
            (echo "Root endpoint check failed" && exit 1)
